# Taskfile.yml
version: '3'

vars:
  UV: uv
  SPHINX_SOURCE: docs/source
  SPHINX_BUILD: docs/_build
  API_OUT: docs/source/api/generated
  NOX_CORE_TEST_SESSIONS: 'tests-core'
  NOX_TEST_SESSIONS: 'tests-3.10 tests-3.11 tests-3.12 tests-3.13 tests-3.14'
  NOX_MIN_SKLEARN_SESSIONS: 'tests-min-sklearn-3.10 tests-min-sklearn-3.11 tests-min-sklearn-3.12'
  # Cross-platform helpers
  VENV_BIN: '{{if eq OS "windows"}}Scripts{{else}}bin{{end}}'
  PYTHON: '{{if eq OS "windows"}}python{{else}}python3{{end}}'

tasks:
# 📋 Default task lists all available tasks
  default:
      desc: List all available tasks
      silent: true
      cmds:
        - task --list

  # ⬇️  Bootstrap — ensure uv is available
  ensure:uv:
    desc: Install uv if it is not already on the PATH
    internal: true
    status:
      - '{{if eq OS "windows"}}where uv{{else}}command -v uv{{end}}'
    cmds:
      - '{{if eq OS "windows"}}powershell -ExecutionPolicy ByPass -c "irm https://astral.sh/uv/install.ps1 | iex"{{else}}curl -LsSf https://astral.sh/uv/install.sh | sh{{end}}'

  # 🛠️ Environment
  install:
    desc: Install all dependencies
    deps: [ensure:uv]
    cmds:
      - "{{.UV}} sync --all-groups"
      - "{{.UV}} pip install .[viz]"
    sources:
      - pyproject.toml
    generates:
      - .venv

  install:release:
      desc: Install only runtime/build dependencies (no lock file)
      cmds:
        - "{{.UV}} pip install --system --no-cache ."
      sources:
        - pyproject.toml

  install:release:sbom:
      desc: Create a clean venv with the built package for SBOM generation
      cmds:
        - '{{if eq OS "windows"}}if exist .venv-release rd /s /q .venv-release{{else}}rm -rf .venv-release{{end}}'
        - "{{.UV}} venv .venv-release --seed"
        - .venv-release/{{.VENV_BIN}}/pip install --no-cache-dir dist/*.whl
        - echo "Release venv created at .venv-release"
        - .venv-release/{{.VENV_BIN}}/pip list
      sources:
        - dist/*.whl
      generates:
        - .venv-release


  update:
    desc: Update all project dependencies
    cmds:
      - "{{.UV}} lock --upgrade"
      - "{{.UV}} sync --all-groups"

  clean:
    desc: Clean up build artifacts and caches
    cmds:
      - '{{if eq OS "windows"}}for %d in (.venv .pytest_cache htmlcov .mypy_cache .ruff_cache dist build) do if exist %d rd /s /q %d{{else}}rm -rf .venv .pytest_cache htmlcov .mypy_cache .ruff_cache dist build *.egg-info{{end}}'
      - '{{if eq OS "windows"}}for /r %d in (__pycache__) do @if exist "%d" rd /s /q "%d"{{else}}find . -type d -name "__pycache__" -exec rm -rf {} +{{end}}'
      - '{{if eq OS "windows"}}del /s /q *.pyc *.pyo 2>nul{{else}}find . -type f -name "*.py[co]" -delete{{end}}'

  # 🧹 Code quality
  format:
    desc: Format code with Ruff
    cmds:
      - "{{.UV}} run ruff format ."

  format-check:
    desc: Check formatting (without modifying files)
    cmds:
      - "{{.UV}} run ruff format --check ."

  lint:
    desc: Run Ruff lint checks
    cmds:
      - "{{.UV}} run ruff check ."

  lint-fix:
    desc: Autofix lint issues with Ruff
    cmds:
      - "{{.UV}} run ruff check . --fix"

  type-check:
    desc: Run ty type checks
    cmds:
      - "{{.UV}} run ty check ./chemotools"

  spelling:
    desc: Run typos for spelling checks
    cmds:
      - "{{.UV}} run typos chemotools"

  # 🧪 Testing
  test:
    desc: Run tests with pytest in the current environment
    cmds:
      - "{{.UV}} run pytest -rs tests/"

  test:quick:
    desc: Run tests with pytest in the current environment
    cmds:
      - task: test

  nox:list:
    desc: List available nox sessions
    cmds:
      - "{{.UV}} run nox --list"

  test:matrix:
    desc: Run the nox compatibility test matrix locally
    cmds:
      - "{{.UV}} run nox -s {{.NOX_CORE_TEST_SESSIONS}}"
      - "{{.UV}} run nox -s {{.NOX_TEST_SESSIONS}}"
      - "{{.UV}} run nox -s {{.NOX_MIN_SKLEARN_SESSIONS}}"

  coverage:
    desc: Run tests with coverage report
    cmds:
      - "{{.UV}} run pytest --cov=chemotools --cov-report=xml --cov-report=term-missing"

  # 📦 Packaging
  build:
    desc: Build the package
    cmds:
      - "{{.UV}} build"

  # 🥊 Install hook for pre-commit
  install-hooks:
    desc: Install Git hooks using Lefthook
    cmds:
      - "{{.UV}} run lefthook install"
    sources:
      - lefthook.yml

  # 🚦 Meta tasks
  check:
    desc: Run all quality checks (format-check, lint, type-check, test)
    cmds:
      - task: format-check
      - task: lint
      - task: spelling
      - task: type-check
      - task: test

  check:matrix:
    desc: Run quality checks plus the nox compatibility matrix
    cmds:
      - task: format-check
      - task: lint
      - task: type-check
      - task: test:matrix

  setup:
    desc: Set up development environment (install + checks)
    cmds:
      - task: install
      - task: install-hooks
      - task: check

  # 📚 Documentation
  docs:html:
    desc: Build English HTML documentation
    cmds:
      - "{{.UV}} run sphinx-build -b html {{.SPHINX_SOURCE}} {{.SPHINX_BUILD}}/html -j auto"

  docs:html-es:
    desc: Build Spanish HTML documentation with button translation fix
    cmds:
      - "{{.UV}} run sphinx-build -b html -D language=es -D html_theme_options.switcher.version_match=es {{.SPHINX_SOURCE}} {{.SPHINX_BUILD}}/html/es -j auto"
      - "{{.UV}} run python docs/fix_translated_buttons.py {{.SPHINX_BUILD}}/html/es es"

  docs:html-zh:
    desc: Build Chinese HTML documentation with button translation fix
    cmds:
      - "{{.UV}} run sphinx-build -b html -D language=zh_CN -D html_theme_options.switcher.version_match=zh_CN {{.SPHINX_SOURCE}} {{.SPHINX_BUILD}}/html/zh_CN -j auto"
      - "{{.UV}} run python docs/fix_translated_buttons.py {{.SPHINX_BUILD}}/html/zh_CN zh_CN"

  docs:html-ja:
    desc: Build Japanese HTML documentation with button translation fix
    cmds:
      - "{{.UV}} run sphinx-build -b html -D language=ja -D html_theme_options.switcher.version_match=ja {{.SPHINX_SOURCE}} {{.SPHINX_BUILD}}/html/ja -j auto"
      - "{{.UV}} run python docs/fix_translated_buttons.py {{.SPHINX_BUILD}}/html/ja ja"

  docs:html-all:
    desc: Build all language variants (en, es, zh_CN, ja)
    cmds:
      - task: docs:html
      - task: docs:html-es
      - task: docs:html-zh
      - task: docs:html-ja

  docs:gettext:
    desc: Extract gettext catalogs
    cmds:
      - "{{.UV}} run sphinx-build -b gettext {{.SPHINX_SOURCE}} {{.SPHINX_BUILD}}/gettext -j auto"

  docs:update-translations:
    desc: Update .po files for es, zh_CN, and ja
    deps: [docs:gettext]
    cmds:
      - "{{.UV}} run sphinx-intl update -p {{.SPHINX_BUILD}}/gettext -d docs/locale -l es -l zh_CN -l ja"

  docs:check:
    desc: Build English docs treating warnings as errors (CI quality gate)
    cmds:
      - "{{.UV}} run sphinx-build -b html {{.SPHINX_SOURCE}} {{.SPHINX_BUILD}}/html -W -j auto"

  serve:
    desc: Live-reload English docs on port 8003 (avoiding port conflicts)
    cmds:
      - "{{.UV}} run sphinx-autobuild {{.SPHINX_SOURCE}} {{.SPHINX_BUILD}}/html --watch chemotools --ignore '{{.SPHINX_BUILD}}/*' --ignore '{{.API_OUT}}/*' --port 8003"

  serve:en:
    desc: Live-reload English docs on port 8003 (avoiding port conflicts)
    cmds:
      - "{{.UV}} run sphinx-autobuild {{.SPHINX_SOURCE}} {{.SPHINX_BUILD}}/html --watch chemotools --ignore '{{.SPHINX_BUILD}}/*' --ignore '{{.API_OUT}}/*' --port 8003"

  serve:zh:
    desc: Serve Chinese docs locally
    cmds:
      - task: docs:html-zh
      - echo "Chinese docs available at http://localhost:8001"
      - cd {{.SPHINX_BUILD}}/html/zh_CN && {{.PYTHON}} -m http.server 8001

  serve:es:
    desc: Serve Spanish docs locally  
    cmds:
      - task: docs:html-es
      - echo "Spanish docs available at http://localhost:8002"
      - cd {{.SPHINX_BUILD}}/html/es && {{.PYTHON}} -m http.server 8002

  serve:ja:
    desc: Serve Japanese docs locally
    cmds:
      - task: docs:html-ja
      - echo "Japanese docs available at http://localhost:8004"
      - cd {{.SPHINX_BUILD}}/html/ja && {{.PYTHON}} -m http.server 8004

  docs:clean:
    desc: Remove build artifacts and generated API stubs
    cmds:
      - rm -rf {{.SPHINX_BUILD}} {{.API_OUT}}
