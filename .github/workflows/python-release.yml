name: Publish Python 🐍 distributions 📦 to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Task
        uses: arduino/setup-task@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print versions
        run: |
          python --version
          uv --version
          task --version

      - name: Install dependencies
        run: task install

      - name: Check formatting
        run: task format-check

      - name: Run linting
        run: task lint

      - name: Run type checking
        run: task type-check

      - name: Run tests with coverage
        run: task coverage

  compatibility:
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
            session: 'tests-3.10'
          - python-version: '3.11'
            session: 'tests-3.11'
          - python-version: '3.12'
            session: 'tests-3.12'
          - python-version: '3.13'
            session: 'tests-3.13'
          - python-version: '3.14'
            session: 'tests-3.14'
          - python-version: '3.10'
            session: 'tests-min-sklearn-3.10'
          - python-version: '3.11'
            session: 'tests-min-sklearn-3.11'
          - python-version: '3.12'
            session: 'tests-min-sklearn-3.12'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Print versions
        run: |
          python --version
          uv --version

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run nox session ${{ matrix.session }}
        run: uv run nox -s ${{ matrix.session }} -- -q

  release:
    runs-on: ubuntu-latest
    needs: [quality, compatibility]
    environment: release
    permissions:
        contents: write
        id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Task
        uses: arduino/setup-task@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print versions
        run: |
          python --version
          uv --version
          task --version

      # 1. Install dependencies
      - name: Install dependencies
        run: task install:release

      # 2. Build package
      - name: Build package
        run: task build

      # 3. Create clean venv with package for SBOM
      - name: Create release environment
        run: task install:release:sbom

      # 4. Publish to PyPI
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      # 5. Generate SBOM from runtime environment
      - name: Generate SBOM
        run: |
          uv tool install cyclonedx-bom
          
          CYCLONEDX_VERSION=$(uv tool run cyclonedx-py --version | head -n1)
          echo "Generating SBOM using $CYCLONEDX_VERSION"
          
          # Use the globally installed tool to scan the clean venv
          uv tool run cyclonedx-py environment \
            --output-format=json \
            --output-file=chemotools-${{ github.event.release.tag_name }}-sbom.json \
            .venv-release
          echo "cyclonedx-bom-version=$CYCLONEDX_VERSION" >> $GITHUB_OUTPUT
        id: sbom

      # 6. Upload SBOM as release asset
      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v1
        with:
          files: chemotools-${{ github.event.release.tag_name }}-sbom.json
          append_body: true
          body: |
            
            ---
            **SBOM Information:**
            - File: `chemotools-${{ github.event.release.tag_name }}-sbom.json`
            - Generated with: `${{ steps.sbom.outputs.cyclonedx-bom-version }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}