name: Generate Changelog

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to update (e.g. v1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for git-cliff
          ref: ${{ github.event.release.tag_name || inputs.tag_name }}

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current --strip all
        env:
          OUTPUT: CHANGELOG_BODY.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Update release body
        run: |
          TAG=${{ github.event.release.tag_name || inputs.tag_name }}
          gh release edit "$TAG" \
            --notes-file CHANGELOG_BODY.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
